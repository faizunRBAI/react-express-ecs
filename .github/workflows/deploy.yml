# GENERATED by UDAP Build Project from .udap/pipeline.yaml — do not
# edit by hand; change the spec and re-render.
name: react-express-ecs
'on':
  workflow_dispatch: {}
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Lint backend
      run: |
        cd backend
        npm install
        npm run lint
    - name: Lint frontend
      run: |
        cd frontend
        npm install
        npm run lint

  test:
    runs-on: ubuntu-latest
    needs:
    - lint
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Test backend
      run: |
        cd backend
        npm install
        npm test

  security:
    runs-on: ubuntu-latest
    needs:
    - lint
    steps:
    - uses: actions/checkout@v4
    - name: Install Trivy
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - name: Trivy filesystem scan
      run: |
        trivy fs --exit-code 1 --severity HIGH,CRITICAL \
          --skip-dirs frontend/node_modules \
          --skip-dirs backend/node_modules \
          .

  build_frontend:
    runs-on: ubuntu-latest
    needs:
    - test
    - security
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Build React app
      run: |
        cd frontend
        npm install
        npm run build
    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/
        retention-days: 1

  build_push:
    runs-on: ubuntu-latest
    needs:
    - test
    - security
    outputs:
      image_uri: ${{ steps.docker_push.outputs.image_uri }}
    steps:
    - uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    - name: Login to Amazon ECR
      id: ecr_login
      uses: aws-actions/amazon-ecr-login@v2
    - name: Build and push Docker image
      id: docker_push
      run: |
        IMAGE_URI="${{ steps.ecr_login.outputs.registry }}/${{ secrets.PROJECT_NAME }}-backend:${{ github.sha }}"
        docker build -t "$IMAGE_URI" ./backend
        docker push "$IMAGE_URI"
        echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  provision:
    runs-on: ubuntu-latest
    needs:
    - build_frontend
    - build_push
    outputs:
      alb_dns: ${{ steps.tf_apply.outputs.alb_dns }}
      cf_url: ${{ steps.tf_apply.outputs.cf_url }}
      s3_bucket: ${{ steps.tf_apply.outputs.s3_bucket }}
    env:
      TF_IN_AUTOMATION: 'true'
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.5
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    - name: Terraform init
      run: |
        cd infra
        terraform init -reconfigure \
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
          -backend-config="region=us-east-1"
    - name: Terraform apply
      id: tf_apply
      run: |
        cd infra
        terraform apply -auto-approve \
          -var="project_name=${{ secrets.PROJECT_NAME }}" \
          -var="image_uri=${{ needs.build_push.outputs.image_uri }}" \
          -var="db_password=${{ secrets.DB_PASSWORD }}"
        echo "alb_dns=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
        echo "cf_url=$(terraform output -raw cloudfront_url)" >> "$GITHUB_OUTPUT"
        echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"

  configure:
    runs-on: ubuntu-latest
    needs:
    - provision
    steps:
    - uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist
    - name: Sync frontend to S3
      run: |
        S3_BUCKET="${{ needs.provision.outputs.s3_bucket }}"
        aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/" \
          --delete \
          --cache-control "public,max-age=31536000,immutable" \
          --exclude "index.html"
        aws s3 cp frontend/dist/index.html "s3://${S3_BUCKET}/index.html" \
          --cache-control "no-cache,no-store,must-revalidate"
    - name: Invalidate CloudFront cache
      run: |
        CF_DOMAIN="${{ needs.provision.outputs.cf_url }}"
        CF_ID=$(aws cloudfront list-distributions \
          --query "DistributionList.Items[?DomainName=='${CF_DOMAIN}'].Id | [0]" \
          --output text)
        if [ -n "$CF_ID" ] && [ "$CF_ID" != "None" ]; then
          aws cloudfront create-invalidation --distribution-id "$CF_ID" --paths "/*"
        fi
    - name: Wait for ECS service stability
      run: |
        aws ecs wait services-stable \
          --cluster "${{ secrets.PROJECT_NAME }}-cluster" \
          --services "${{ secrets.PROJECT_NAME }}-backend" \
          --region us-east-1

  verify:
    runs-on: ubuntu-latest
    needs:
    - configure
    - provision
    steps:
    - uses: actions/checkout@v4
    - name: Health check backend
      run: |
        ALB_DNS="${{ needs.provision.outputs.alb_dns }}"
        curl --fail --retry 12 --retry-delay 15 --retry-all-errors \
          "http://${ALB_DNS}/health"
    - name: Verify frontend
      run: |
        CF_URL="${{ needs.provision.outputs.cf_url }}"
        curl --fail --retry 6 --retry-delay 10 --retry-all-errors \
          "https://${CF_URL}"
    - name: Print deployment URLs
      run: |
        echo "=================================="
        echo "  Deployment Complete"
        echo "=================================="
        echo "  Frontend:   https://${{ needs.provision.outputs.cf_url }}"
        echo "  Backend:    http://${{ needs.provision.outputs.alb_dns }}"
        echo "  Health:     http://${{ needs.provision.outputs.alb_dns }}/health"
        echo "=================================="
