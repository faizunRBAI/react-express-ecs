  security:
    runs-on: ubuntu-latest
    needs:
    - lint
    steps:
    - uses: actions/checkout@v4
    - name: Install Trivy
      run: 'curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
        | sh -s -- -b /usr/local/bin

        '
    - name: Trivy filesystem scan
      run: "trivy fs --exit-code 1 --severity HIGH,CRITICAL \\\n  --skip-dirs frontend/node_modules\
        \ \\\n  --skip-dirs backend/node_modules \\\n  .\n"
  build_frontend:
    runs-on: ubuntu-latest
    needs:
    - test
