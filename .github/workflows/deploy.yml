        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    - name: Terraform init
      run: "cd infra\nterraform init \\\n  -backend-config=\"bucket=${{ secrets.TF_STATE_BUCKET\
