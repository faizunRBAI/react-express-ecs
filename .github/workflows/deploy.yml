        $CF_ID\" --paths \"/*\"\nfi\n"
    - name: Wait for ECS service stability
      run: "aws ecs wait services-stable \\\n  --cluster \"${{ secrets.PROJECT_NAME\
        \ }}-cluster\" \\\n  --services \"${{ secrets.PROJECT_NAME }}-backend\" \\\
        \n  --region us-east-1\n"
  verify:
    runs-on: ubuntu-latest
    needs:
    - configure
    - provision
    steps:
    - uses: actions/checkout@v4
    - name: Health check backend
      run: "ALB_DNS=\"${{ needs.provision.outputs.alb_dns }}\"\ncurl --fail --retry\
        \ 12 --retry-delay 15 --retry-all-errors \\\n  \"http://${ALB_DNS}/health\"\
        \n"
    - name: Verify frontend
      run: "CF_URL=\"${{ needs.provision.outputs.cf_url }}\"\ncurl --fail --retry\
        \ 6 --retry-delay 10 --retry-all-errors \\\n  \"https://${CF_URL}\"\n"
    - name: Print deployment URLs
      run: 'echo "=================================="

        echo "  Deployment Complete"

        echo "=================================="

        echo "  Frontend:   https://${{ needs.provision.outputs.cf_url }}"

        echo "  Backend:    http://${{ needs.provision.outputs.alb_dns }}"

        echo "  Health:     http://${{ needs.provision.outputs.alb_dns }}/health"

        echo "=================================="

        '
