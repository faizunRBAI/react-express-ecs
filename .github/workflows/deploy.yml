        \ output -raw s3_bucket_name)\" >> \"$GITHUB_OUTPUT\"\n"
  configure:
    runs-on: ubuntu-latest
    needs:
    - provision
    steps:
    - uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist
    - name: Sync frontend to S3
      run: "S3_BUCKET=\"${{ needs.provision.outputs.s3_bucket }}\"\naws s3 sync frontend/dist/\
        \ \"s3://${S3_BUCKET}/\" \\\n  --delete \\\n  --cache-control \"public,max-age=31536000,immutable\"\
        \ \\\n  --exclude \"index.html\"\naws s3 cp frontend/dist/index.html \"s3://${S3_BUCKET}/index.html\"\
        \ \\\n  --cache-control \"no-cache,no-store,must-revalidate\"\n"
    - name: Invalidate CloudFront cache
      run: "CF_URL=\"${{ needs.provision.outputs.cf_url }}\"\nCF_ID=$(aws cloudfront\
        \ list-distributions \\\n  --query \"DistributionList.Items[?DomainName=='${CF_URL}'].Id\
        \ | [0]\" \\\n  --output text)\nif [ -n \"$CF_ID\" ] && [ \"$CF_ID\" != \"\
